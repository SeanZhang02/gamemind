name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phase-c-0-probe:
    name: phase-c-0 probe — lint & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install project dependencies
        working-directory: phase-c-0
        run: uv sync --no-dev

      - name: Ruff lint
        working-directory: phase-c-0
        run: uv tool run ruff@0.14.0 check --config pyproject.toml probe/

      - name: Ruff format check
        working-directory: phase-c-0
        run: uv tool run ruff@0.14.0 format --check probe/

      - name: Import check
        working-directory: phase-c-0
        run: |
          uv run python -c "
          import probe.client
          import probe.tasks
          import probe.run
          print('imports ok:', probe.client.__name__, probe.tasks.__name__, probe.run.__name__)
          "

  gamemind-package:
    name: gamemind package — lint, format, import & smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install gamemind
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv tool run ruff@0.14.0 check --config pyproject.toml gamemind/ tests/

      - name: Ruff format check
        run: uv tool run ruff@0.14.0 format --check gamemind/ tests/

      - name: Import check
        run: |
          uv run python -c "
          import gamemind
          from gamemind import errors
          from gamemind.capture import CaptureBackend, CaptureResult
          from gamemind.capture.wgc_backend import WGCBackend
          from gamemind.capture.dxgi_backend import DXGIBackend
          from gamemind.capture.selector import CaptureSelector
          from gamemind.cli import main as cli_main
          from gamemind.daemon.main import app
          print('imports ok: gamemind', gamemind.__version__)
          print('error classes:', len(errors.__all__))
          print('routes:', [r.path for r in app.routes])
          "

      - name: Pytest smoke tests
        run: uv run pytest tests/ -v

  design-rules:
    name: Three Design Rules enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rule 1 — no hand-authored mouse coordinates
        run: |
          # Search for literal integer mouse_move calls in any action-layer code.
          # Allowed: probe/ (historical), docs/ (descriptive), tests/ (mocks).
          # Disallowed: gamemind/, phase-c/, action/, adapters/.
          MATCHES=$(grep -rE "mouse_move\s*\(\s*-?[0-9]+\s*,\s*-?[0-9]+\s*\)" \
            --include="*.py" \
            --exclude-dir=probe \
            --exclude-dir=docs \
            --exclude-dir=tests \
            --exclude-dir=.venv \
            . 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Rule 1 violation — hand-authored mouse coordinates found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ Rule 1 pass"

      - name: Rule 2 — no per-game Python conditionals in Layer 6 adapters
        run: |
          # Adapters should be pure YAML. No Python files under adapters/.
          for adapter_dir in gamemind/adapters phase-c/adapters adapters; do
            if [ -d "$adapter_dir" ]; then
              PY_IN_ADAPTERS=$(find "$adapter_dir" -name "*.py" 2>/dev/null || true)
              if [ -n "$PY_IN_ADAPTERS" ]; then
                echo "❌ Rule 2 violation — Python files in $adapter_dir:"
                echo "$PY_IN_ADAPTERS"
                exit 1
              fi
            fi
          done
          # And no `if game ==` / `if self.game ==` branches anywhere.
          MATCHES=$(grep -rE 'if\s+(self\.)?game\s*==' \
            --include="*.py" \
            --exclude-dir=.venv \
            --exclude-dir=docs \
            . 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Rule 2 violation — per-game Python conditionals found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ Rule 2 pass"

      - name: Rule 3 — per-game prompts must be generic
        run: |
          # Scan for hardcoded game names in prompt string literals.
          # This is a heuristic: flag lines containing BOTH a game name AND a
          # prompt-shape indicator (prompt= / "You are looking at" / etc.)
          # Allowed: probe/tasks.py (Minecraft-specific, v0 historical).
          # Disallowed: gamemind/**/*.py prompts.
          for src_dir in gamemind phase-c; do
            if [ -d "$src_dir" ]; then
              MATCHES=$(grep -rniE '(prompt\s*=|"You are looking at).*(minecraft|delta force|stardew|factorio|dead ?cells|vampire survivors)' \
                --include="*.py" \
                "$src_dir/" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                echo "❌ Rule 3 violation — hardcoded game names in $src_dir/ prompts:"
                echo "$MATCHES"
                exit 1
              fi
            fi
          done
          echo "✓ Rule 3 pass (scoped to gamemind/ and phase-c/)"

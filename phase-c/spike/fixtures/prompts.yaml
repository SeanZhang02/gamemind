# Phase 1 spike — Grounding DINO prompt sets.
#
# Two disjoint groups by scene type. The eval harness selects a group per
# fixture by looking at which labels appear in the ground-truth .json:
#   - any UI label → use `ui` group
#   - otherwise    → use `world` group
#
# hud group removed 2026-04-14 — 0/21 TP on Day 2 eval (health_bar 0/5,
# hunger_bar 0/5, xp_bar 0/0 + hotbar 0/11 while nominally in `ui`),
# contributed zero F1 but cost ~76ms per multi-pass frame. Re-add if a
# future fixture demonstrates HUD classes are recoverable (e.g. via
# template matching or a dedicated HUD detector — not GD-tiny).
#
# Per Grounding DINO spec, classes in a single prompt are joined by " . "
# (dot with spaces around it). GD matches each prompt *token* back to a
# class; keep class names lowercase snake_case so GD doesn't split them on
# the subword tokenizer boundaries in weird ways.
#
# This file is hand-edited. If you add a class, also add a fixture that
# contains it — otherwise per-class recall will be undefined (TP+FN == 0)
# and the harness will report recall = NaN for that class.

world:
  - tree
  - oak_log
  - leaves
  - grass_block
  - stone
  - iron_ore
  - crafting_table
  - cow
  - zombie
  - creeper

ui:
  - inventory_grid
  - crafting_grid_2x2
  - crafting_grid_3x3
  - hotbar
  - inventory_slot
  - item_in_slot
  - output_slot

# Minecraft Java Edition adapter — v1 scope, chop_logs task only.
#
# Phase C Step 1 iter-3 ships this as a skeleton to validate the
# loader and schema end-to-end. Phase C Step 3 fills in the complete
# action set + inventory_ui + additional goal grammars (water_crops
# is Stardew's, not Minecraft's; this file intentionally scoped narrow).

schema_version: 1
display_name: "Minecraft Java Edition"

perception:
  freshness_budget_ms: 700.0
  tick_hz: 2.0
  spatial_schema:
    facing_categories: ["looking_down", "looking_at_horizon", "looking_up"]
    distance_categories: ["close", "medium", "far"]
    direction_categories: ["ahead", "ahead_left", "ahead_right", "left", "right", "behind"]
    anchor_max_age_frames: 20  # @ 2Hz, 20 frames = 10 seconds

intents:
  approach:
    description: "Move toward a spatial anchor"
    stall_threshold_frames: 10
  look_around:
    description: "Survey surroundings by rotating"
    stall_threshold_frames: 10
  attack_target:
    description: "Attack the block/entity at crosshair"
    stall_threshold_frames: 16
  retreat:
    description: "Move away from danger"
    stall_threshold_frames: 6

actions:
  forward: "W"
  backward: "S"
  strafe_left: "A"
  strafe_right: "D"
  jump: "Space"
  sneak: "LeftShift"
  sprint: "LeftControl"
  attack: "MouseLeft"
  use_item: "MouseRight"
  open_inventory: "E"
  drop_item: "Q"
  chat: "T"
  third_person: "F5"
  debug: "F3"
  look_up:    "mouse_rel:0,-40"
  look_down:  "mouse_rel:0,40"
  turn_left:  "mouse_rel:-80,0"
  turn_right: "mouse_rel:80,0"

world_facts:
  axe_crafting: "Two planks vertical in a crafting table yield one stick; three planks over two sticks yield an axe."
  log_source: "Oak, birch, spruce, jungle, acacia, dark oak, mangrove, and cherry trees each produce corresponding log blocks when attacked repeatedly."
  inventory_layout: "Hotbar is 9 slots at the bottom of the HUD. Full inventory (E) shows 3 rows of 9 storage slots plus the hotbar row."

goal_grammars:
  chop_logs:
    description: "Collect N logs of any wood type by attacking tree trunks."
    preconditions:
      - "a log-bearing tree is visible in the current frame"
    success_check:
      predicate:
        type: inventory_count
        target: "log"
        operator: ">="
        value: 3
    abort_conditions:
      - type: health_threshold
        operator: "<"
        value: 0.3
      - type: time_limit
        seconds: 600
